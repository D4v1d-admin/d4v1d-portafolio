<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos | D4v1d</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="pagina-interior">
    <canvas id="fondoCanvas"></canvas>
    
    <h1>📋 Mis Datos</h1>
    
    <nav class="menu">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">🎨 Proyectos</a>
        <a href="datos.html">📋 Datos</a>
    </nav>

    <div id="datos-personales" class="datos-container">
        <!-- Se llena con JavaScript -->
    </div>

    <script>
        fetch('data/datos.json')
            .then(res => res.json())
            .then(datos => {
                const contenedor = document.getElementById('datos-personales');
                contenedor.innerHTML = `
                    <p><strong>Nombre:</strong> ${datos.nombre}</p>
                    <p><strong>Alias:</strong> ${datos.alias}</p>
                    <p><strong>Email:</strong> ${datos.email}</p>
                    <p><strong>DeviantArt:</strong> <a href="${datos.deviantart}" target="_blank">${datos.deviantart}</a></p>
                    <p><strong>GitHub:</strong> <a href="${datos.github}" target="_blank">${datos.github}</a></p>
                    <p><strong>Habilidades:</strong> ${datos.habilidades.join(', ')}</p>
                    <p><strong>Bio:</strong> ${datos.biografia}</p>
                `;
            })
            .catch(error => {
                document.getElementById('datos-personales').innerHTML = 
                    '<p style="color:#e63946;">Error al cargar los datos</p>';
            });
    </script>
    <script src="js/particulas.js"></script>
</body>
</html>
