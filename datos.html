<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos | D4v1d</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css?v=2">
</head>
<body class="pagina-interior">

    <!-- Pantalla de carga -->
    <div class="loader" id="loader">
        <div class="pixel-carga">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p>Cargando...</p>
    </div>

    <canvas id="fondoCanvas"></canvas>

    <!-- Toggle modo oscuro/claro -->
    <button id="toggleModo" style="position:fixed;top:80px;right:20px;z-index:9999;background:#1e3a8a;border:2px solid #3b82f6;color:#fff;padding:8px 12px;border-radius:50%;cursor:pointer;font-size:1.2rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;" title="Cambiar modo">🌙</button>
    
    <nav class="menu">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">🎨 Proyectos</a>
        <a href="datos.html" class="activa">📋 Datos</a>
    </nav>

    <h1>📋 Mis Datos</h1>

    <div id="datos-personales" class="datos-container">
        <!-- Se llena con JavaScript -->
    </div>

    <!-- Botón volver arriba -->
    <button class="btn-volver-arriba" id="btnVolverArriba" title="Volver arriba">⬆</button>

    <script src="js/particulas.js"></script>
    <script>
        // Ocultar loader al cargar
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loader').classList.add('oculto');
            }, 500);
        });

        // Cargar datos
        fetch('data/datos.json')
            .then(res => res.json())
            .then(datos => {
                const contenedor = document.getElementById('datos-personales');
                contenedor.innerHTML = `
                    <p><strong>Nombre:</strong> ${datos.nombre}</p>
                    <p><strong>Alias:</strong> ${datos.alias}</p>
                    <p><strong>Email:</strong> ${datos.email}</p>
                    <p><strong>DeviantArt:</strong> <a href="${datos.deviantart}" target="_blank">${datos.deviantart}</a></p>
                    <p><strong>GitHub:</strong> <a href="${datos.github}" target="_blank">${datos.github}</a></p>
                    <p><strong>Habilidades:</strong> ${datos.habilidades.join(', ')}</p>
                    <p><strong>Bio:</strong> ${datos.biografia}</p>
                    <p><strong>💰 Comisiones:</strong> ${datos.comisiones}</p>
                    <p><strong>💳 Métodos de pago:</strong> ${datos.metodos_pago.join(', ')}</p>
                    <p><strong>🔗 PayPal:</strong> <a href="${datos.paypal}" target="_blank">Pagar aquí</a></p>
                    <p><strong>💵 Precios:</strong> ${datos.precios}</p>
                `;
            })
            .catch(error => {
                document.getElementById('datos-personales').innerHTML = 
                    '<p style="color:#e63946;">Error al cargar los datos</p>';
            });

        // Protección anti-copia
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'p') || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                alert('🚫 Esta acción está deshabilitada para proteger el contenido.');
                return false;
            }
        });

        // Botón volver arriba
        const btnVolver = document.getElementById('btnVolverArriba');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 100) {
                btnVolver.classList.add('visible');
            } else {
                btnVolver.classList.remove('visible');
            }
        });
        btnVolver.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Modo oscuro/claro
        const toggleModo = document.getElementById('toggleModo');
        if (toggleModo) {
            if (localStorage.getItem('modoClaro') === '1') {
                document.body.classList.add('modo-claro');
                toggleModo.textContent = '☀️';
            }
            toggleModo.addEventListener('click', function() {
                document.body.classList.toggle('modo-claro');
                if (document.body.classList.contains('modo-claro')) {
                    localStorage.setItem('modoClaro', '1');
                    toggleModo.textContent = '☀️';
                } else {
                    localStorage.setItem('modoClaro', '0');
                    toggleModo.textContent = '🌙';
                }
            });
        }
    </script>
</body>
</html>
