<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4v1d | Pixel Art & Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <!-- Pantalla de carga -->
    <div class="loader" id="loader">
        <div class="pixel-carga">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p>Cargando...</p>
    </div>

    <canvas id="fondoCanvas"></canvas>

    <!-- Toggle modo oscuro/claro -->
    <button id="toggleModo" style="position:fixed;top:80px;right:20px;z-index:9999;background:#1e3a8a;border:2px solid #3b82f6;color:#fff;padding:8px 12px;border-radius:50%;cursor:pointer;font-size:1.2rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;" title="Cambiar modo">🌙</button>

    <header class="hero">
        <div class="logo-container">
            <img src="img/logo.png" alt="D4v1d" class="logo-img" id="avatarParpadeo">
            <h1 class="nombre">D4v1d</h1>
        </div>
        <p class="subtitulo">Animador de Personajes MUGEN • Pixel Art • Programador C++</p>
        
        <nav class="menu">
            <a href="index.html" class="activa">🏠 Inicio</a>
            <a href="proyectos.html">🎨 Proyectos</a>
            <a href="datos.html">📋 Datos</a>
        </nav>
    </header>

    <script src="js/particulas.js"></script>

    <!-- Botón secreto admin -->
    <a href="admin.html" style="position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background-color: transparent; z-index: 999; display: block; opacity: 0; transition: opacity 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0'" title="Admin">🔐</a>

    <!-- Botón volver arriba -->
    <button class="btn-volver-arriba" id="btnVolverArriba" title="Volver arriba">⬆</button>

    <!-- Contador de visitas -->
    <div class="contador-visitas">
        👁 <span id="contadorVisitas">0</span>
    </div>

    <script>
        // Ocultar loader al cargar
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loader').classList.add('oculto');
            }, 500);
        });

        // Protección anti-copia
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'p') || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                alert('🚫 Esta acción está deshabilitada para proteger el contenido.');
                return false;
            }
        });

        // Botón volver arriba
        const btnVolver = document.getElementById('btnVolverArriba');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 100) {
                btnVolver.classList.add('visible');
            } else {
                btnVolver.classList.remove('visible');
            }
        });
        btnVolver.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Contador de visitas (no cuenta al admin)
        function cargarContador() {
            let visitas = localStorage.getItem('visitasD4v1d');
            if (!visitas) visitas = 0;
            document.getElementById('contadorVisitas').textContent = visitas;
        }
        
        if (!localStorage.getItem('esAdminD4v1d')) {
            let visitas = localStorage.getItem('visitasD4v1d');
            if (!visitas) visitas = 0;
            else visitas = parseInt(visitas);
            visitas = visitas + 1;
            localStorage.setItem('visitasD4v1d', visitas);
        }
        
        cargarContador();

        // Avatar que parpadea
        const avatar = document.getElementById('avatarParpadeo');
        if (avatar) {
            avatar.addEventListener('mouseenter', function() {
                this.style.animation = 'none';
            });
            avatar.addEventListener('mouseleave', function() {
                this.style.animation = 'parpadeo 6s infinite';
            });
        }

        // Modo oscuro/claro
        const toggleModo = document.getElementById('toggleModo');
        if (toggleModo) {
            if (localStorage.getItem('modoClaro') === '1') {
                document.body.classList.add('modo-claro');
                toggleModo.textContent = '☀️';
            }
            toggleModo.addEventListener('click', function() {
                document.body.classList.toggle('modo-claro');
                if (document.body.classList.contains('modo-claro')) {
                    localStorage.setItem('modoClaro', '1');
                    toggleModo.textContent = '☀️';
                } else {
                    localStorage.setItem('modoClaro', '0');
                    toggleModo.textContent = '🌙';
                }
            });
        }
                        // Easter egg - Doble flecha arriba
        let arribaPresionado = 0;
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') {
                arribaPresionado++;
                if (arribaPresionado >= 2) {
                    const mensaje = document.createElement('div');
                    mensaje.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border:3px solid #3b82f6;padding:30px;z-index:99999;text-align:center;font-family:"Press Start 2P",monospace;color:#3b82f6;font-size:1rem;box-shadow:0 0 50px rgba(59,130,246,0.8);';
                    mensaje.innerHTML = '🎮<br>¡Easter Egg!<br><br>D4v1d te saluda<br>👾';
                    document.body.appendChild(mensaje);
                    setTimeout(() => mensaje.remove(), 3000);
                    arribaPresionado = 0;
                }
                setTimeout(() => { arribaPresionado = 0; }, 800);
            }
        });
    </script>
</body>
</html>
