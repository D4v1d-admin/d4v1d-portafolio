<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos | D4v1d</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }
    </style>
</head>
<body class="pagina-interior">

    <!-- Pantalla de carga -->
    <div class="loader" id="loader">
        <div class="pixel-carga">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p>Cargando...</p>
    </div>

    <canvas id="fondoCanvas"></canvas>

    <!-- Toggle modo oscuro/claro -->
    <button id="toggleModo" style="position:fixed;top:80px;right:20px;z-index:9999;background:#1e3a8a;border:2px solid #3b82f6;color:#fff;padding:8px 12px;border-radius:50%;cursor:pointer;font-size:1.2rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;" title="Cambiar modo">🌙</button>
    
    <h1>🎨 Mis Proyectos</h1>
    
    <nav class="menu">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html" class="activa">🎨 Proyectos</a>
        <a href="datos.html">📋 Datos</a>
    </nav>

    <main id="lista-proyectos" class="galeria">
        <!-- Se llena con JavaScript -->
    </main>

    <!-- Botón volver arriba -->
    <button class="btn-volver-arriba" id="btnVolverArriba" title="Volver arriba">⬆</button>

    <!-- Lightbox para zoom -->
    <div class="lightbox" id="lightbox">
        <span class="cerrar" id="cerrarLightbox">✕</span>
        <img src="" alt="Zoom" id="imagenLightbox">
    </div>

    <script src="js/particulas.js"></script>
    <script src="js/cargar-proyectos.js"></script>
    <script>
        // Ocultar loader al cargar
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loader').classList.add('oculto');
            }, 500);
        });

        // Protección anti-copia
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'p') || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                alert('🚫 Esta acción está deshabilitada para proteger el contenido.');
                return false;
            }
        });

        // Botón volver arriba
        const btnVolver = document.getElementById('btnVolverArriba');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 100) {
                btnVolver.classList.add('visible');
            } else {
                btnVolver.classList.remove('visible');
            }
        });
        btnVolver.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Modo oscuro/claro
        const toggleModo = document.getElementById('toggleModo');
        if (toggleModo) {
            if (localStorage.getItem('modoClaro') === '1') {
                document.body.classList.add('modo-claro');
                toggleModo.textContent = '☀️';
            }
            toggleModo.addEventListener('click', function() {
                document.body.classList.toggle('modo-claro');
                if (document.body.classList.contains('modo-claro')) {
                    localStorage.setItem('modoClaro', '1');
                    toggleModo.textContent = '☀️';
                } else {
                    localStorage.setItem('modoClaro', '0');
                    toggleModo.textContent = '🌙';
                }
            });
        }

        // Zoom en imágenes
        document.addEventListener('click', function(e) {
            if (e.target.closest('.img-container img')) {
                const img = e.target.closest('.img-container img');
                const lightbox = document.getElementById('lightbox');
                const imgZoom = document.getElementById('imagenLightbox');
                imgZoom.src = img.src;
                lightbox.classList.add('activo');
            }
        });

        document.getElementById('cerrarLightbox').addEventListener('click', function() {
            document.getElementById('lightbox').classList.remove('activo');
        });

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('activo');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('lightbox').classList.remove('activo');
            }
        });
    </script>
</body>
</html>
